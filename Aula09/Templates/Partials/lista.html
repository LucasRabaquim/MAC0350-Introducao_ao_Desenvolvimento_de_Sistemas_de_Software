<div>
    <input type="text" name="busca" placeholder="Buscar..." hx-get="/lista" hx-trigger="input changed delay:500ms"
        hx-select="#lista" hx-target="#lista" hx-indicator="#indicator">

    <img id="indicator" class="htmx-indicator" src="/Static/spinner.svg" alt="Carregando..." />
</div>


<div id="lista">
    <ul>
        {% for aluno in alunos %}
        <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
        <li>Não há alunos</li>
        {% endfor %}
    </ul>
    <button hx-get="/lista?page={{ page - 1 }}" hx-select="#lista" hx-target="#lista" {% if page == 0 %} disabled {% endif %}>
        Anterior
    </button>
    
    <button hx-get="/lista?page={{ page + 1 }}" hx-select="#lista" hx-target="#lista"
    {% if last == True %} disabled {% endif %}>
        Próximo
    </button>
</div>
