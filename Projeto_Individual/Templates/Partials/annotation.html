<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="../../static/global.css" />
  <link rel="stylesheet" href="../../static/post.css" />
</head>


<div class="card post flex-col" id="annotation-{{ annotation.id }}">
  <div class="flex flex-row justify-around align-center relative">
    <span>{{ (annotation.date).strftime('%d/%m/%Y') }} </span>
    <span>{{ owner.name }}@<span class="secondary-text">{{ owner.username }}</span></span>



    <span><input type="checkbox" name="visibility" id="visibility-setting" disabled {% if annotation.public %}checked{%
        endif %} />
      <label for="visibility-setting"></label></span>

    {% if owner.id == user.id %}
    <button class="three-dots" hx-get="/annotation_options_component?id={{ annotation.id }}"><i
        class="fas fa-ellipsis-v"></i></button>
      {% endif %}

  </div>
  <div class="post-text flex flex-col justify-center">
    {{ annotation.text }}
  </div>
</div>
