<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anotobolso - Signin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sign.css" />
</head>
<body>
    <main class="flex flex-col justify-center align-center flex-grow">
  <div class="card sign-card flex flex-col ">
    <h1>Entrar</h1>
    <form action="#" method="POST">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required />
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="********" required minlength="8" />
      <button type="submit">Entrar</button>
    </form>
    <p id="sign-card-link">Ainda não tem conta? <a href="signup.html">Cadastre-se</a></p>
  </div>
  </main>
</body>
</html>
